<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dealer Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2196f3,#00d4ff);
}

.box{
width:95%;
max-width:380px;
background:white;
padding:30px 25px;
border-radius:25px;
box-shadow:0 10px 35px rgba(0,0,0,.25);
}

h2{
text-align:center;
margin-bottom:25px;
color:#2196f3;
}

input{
width:100%;
padding:15px;
margin:12px 0;
border:none;
background:#f2f2f2;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.loginbtn{
background:#2196f3;
color:white;
margin-top:10px;
}

.signupbtn{
background:#10b981;
color:white;
margin-top:15px;
}

p{
text-align:center;
margin-top:18px;
color:#777;
}
</style>
</head>
<body>

<div class="box">

<h2>Dealer Login</h2>

<input type="text" id="mobile" placeholder="Mobile Number">

<input type="password" id="password" placeholder="Password">

<button class="loginbtn" onclick="login()">
Login
</button>

<button class="signupbtn"
onclick="window.location.href='signup.html'">
Create New Account
</button>

<p>Dealer Panel Secure Access</p>

</div>


<script>
const supabaseUrl="https://katbdbzoufiblnnsoxkk.supabase.co";

const supabaseKey="sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a";

const supabase = window.supabase.createClient(
supabaseUrl,
supabaseKey
);


async function login(){

let mobile=document.getElementById("mobile").value;
let password=document.getElementById("password").value;

if(!mobile || !password){
alert("Fill all fields");
return;
}

let {data,error}=await supabase
.from("dealers")
.select("*")
.eq("mobile",mobile)
.eq("password",password)
.single();

if(error || !data){
alert("Wrong login details");
return;
}

localStorage.setItem(
"dealer",
JSON.stringify(data)
);

alert("Login Success");

window.location.href="dealerhome.html";

}
</script>

</body>
</html>
