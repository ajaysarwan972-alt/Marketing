<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Signup</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.top{
background:red;
height:40px;
}

.container{
max-width:400px;
margin:auto;
padding:20px;
}

h1{
color:red;
margin-top:20px;
}

.input{
width:90%;
margin:10px 0;
padding:15px;
border:none;
border-radius:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
font-size:16px;
outline:none;
}

.btn{
width:90%;
padding:15px;
border:none;
border-radius:25px;
background:red;
color:#fff;
font-size:18px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

.blueBtn{
background:#3498db;
}

.page{
display:none;
}

.active{
display:block;
}
</style>

</head>

<body>

<div class="top"></div>

<div class="container">

<!-- LOGIN -->
<div id="loginPage" class="page active">

<h1>DEALER LOGIN</h1>

<input id="loginMobile" class="input" placeholder="Mobile Number">
<input id="loginPassword" type="password" class="input" placeholder="Password">

<button class="btn" onclick="login()">LOGIN</button>

<p>New Dealer?</p>
<button class="btn blueBtn" onclick="showPage('signupPage')">
Create Account
</button>

</div>

<!-- SIGNUP -->
<div id="signupPage" class="page">

<h1>DEALER SIGNUP</h1>

<input id="name" class="input" placeholder="Full Name">
<input id="mobile" class="input" placeholder="Mobile Number">
<input id="password" type="password" class="input" placeholder="Password">

<button class="btn" onclick="signup()">REGISTER</button>

<p>Already have account?</p>
<button class="btn blueBtn" onclick="showPage('loginPage')">
Back to Login
</button>

</div>

</div>

<script>

// SUPABASE
const client = supabase.createClient(
"https://katbdbzoufiblnnsoxkk.supabase.co",
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// AUTO LOGIN
if(localStorage.getItem("dealer")){
location.href="dealerhome.html";
}

// PAGE SWITCH
function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// LOGIN
async function login(){

let mobile = document.getElementById("loginMobile").value.trim();
let password = document.getElementById("loginPassword").value.trim();

if(!mobile || !password){
alert("Fill all fields");
return;
}

let {data,error} = await client
.from("dealers")
.select("*")
.eq("mobile",mobile)
.eq("password",password)
.single();

if(error || !data){
alert("Wrong Mobile or Password ❌");
return;
}

localStorage.setItem("dealer", JSON.stringify(data));

alert("Login Success ✅");

location.href="dealerhome.html";
}

// SIGNUP
async function signup(){

let name = document.getElementById("name").value.trim();
let mobile = document.getElementById("mobile").value.trim();
let password = document.getElementById("password").value.trim();

if(!name || !mobile || !password){
alert("Fill all fields");
return;
}

let {error} = await client
.from("dealers")
.insert([{
name:name,
mobile:mobile,
password:password
}]);

if(error){
alert("Signup Failed ❌");
return;
}

alert("Signup Success ✅");
showPage('loginPage');
}

</script>

</body>
</html>
