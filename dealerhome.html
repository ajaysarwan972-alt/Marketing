<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dealer Home</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f6fb;
padding-bottom:50px;
}

.top{
background:linear-gradient(135deg,#0072ff,#00c6ff);
padding:20px;
border-radius:0 0 30px 30px;
color:white;
}

h2{
margin-bottom:8px;
}

.addbtn{
width:100%;
padding:14px;
margin-top:15px;
border:none;
background:#10b981;
color:white;
font-size:18px;
font-weight:bold;
border-radius:14px;
}

.wrap{
padding:18px;
}

.card{
background:white;
padding:18px;
margin-top:15px;
border-radius:18px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.name{
font-size:20px;
font-weight:bold;
}

.price{
margin-top:8px;
color:#0072ff;
font-size:18px;
font-weight:bold;
}

.desc{
margin-top:8px;
color:#666;
}

.del{
margin-top:14px;
width:100%;
padding:12px;
background:#ff4d4d;
border:none;
color:white;
border-radius:10px;
font-weight:bold;
}

.empty{
text-align:center;
margin-top:60px;
color:#666;
font-size:18px;
}
</style>
</head>
<body>

<div class="top">
<h2 id="welcome">Welcome Dealer</h2>

<button class="addbtn"
onclick="window.location.href='dashboard.html'">
+ Add Product
</button>
</div>

<div class="wrap" id="productList">
<div class="empty">Loading...</div>
</div>


<script>
const supabaseUrl=
"https://katbdbzoufiblnnsoxkk.supabase.co";

const supabaseKey=
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a";

const supabase=
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

let dealer=
JSON.parse(localStorage.getItem("dealer"));

if(!dealer){
location.href="dealer-login.html";
}

document.getElementById("welcome").innerHTML=
"Welcome "+dealer.name;


async function loadProducts(){

let {data,error}=await supabase
.from("products")
.select("*")
.eq("dealer_id",dealer.id)
.order("created_at",{ascending:false});

let box=document.getElementById("productList");

if(!data || data.length==0){
box.innerHTML=
'<div class="empty">No Products Added</div>';
return;
}

let html="";

data.forEach(item=>{

html+=`
<div class="card">

<div class="name">
${item.product_name}
</div>

<div class="price">
₹ ${item.price}
</div>

<div class="desc">
${item.description || ""}
</div>

<button class="del"
onclick="deleteProduct('${item.id}')">
Delete Product
</button>

</div>
`;

});

box.innerHTML=html;

}



async function deleteProduct(id){

if(!confirm("Delete Product?")) return;

await supabase
.from("products")
.delete()
.eq("id",id);

loadProducts();

}

loadProducts();

</script>

</body>
  </html>
