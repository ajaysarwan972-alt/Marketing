<!DOCTYPE html>
<html>
<head>
<title>Product</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<div id="product"></div>

<button style="margin:20px;padding:12px;background:green;color:white;width:90%;">
  Buy Now
</button>

<script>
const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let id = new URLSearchParams(window.location.search).get("id");

async function loadProduct(){
  let { data } = await client
    .from("products")
    .select("*")
    .eq("id", id)
    .single();

  document.getElementById("product").innerHTML = `
    <img src="${data.image}" style="width:100%;">
    <h2>${data.name}</h2>
    <h3>₹${data.price}</h3>
    <p>Category: ${data.category || "N/A"}</p>
  `;
}

loadProduct();
</script>

</body>
</html>
