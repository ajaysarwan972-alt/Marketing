<!DOCTYPE html>
<html>
<head>
<title>Product Detail</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f6fa;
}

.container{
  max-width:500px;
  margin:auto;
  background:white;
  min-height:100vh;
}

/* 🔥 IMAGE FIX */
.product-img{
  width:100%;
  height:260px;
  object-fit:contain;
  background:#fff;
}

/* DETAILS */
.details{
  padding:15px;
}

h2{
  font-size:20px;
  margin:10px 0;
  color:#222;
}

.price{
  font-size:22px;
  color:green;
  font-weight:bold;
  margin:10px 0;
}

.desc{
  font-size:15px;
  color:#555;
  line-height:1.6;
  margin-top:10px;
}

/* BUY BUTTON */
button{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:15px;
  background:green;
  color:white;
  font-size:18px;
  border:none;
}
</style>

</head>

<body>

<div class="container">

  <div id="product"></div>

</div>

<!-- BUY BUTTON -->
<button onclick="sendWhatsApp()">
  Buy on WhatsApp
</button>

<script>

const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let id = new URLSearchParams(window.location.search).get("id");

let productData = {};

// ================= LOAD PRODUCT =================
async function loadProduct(){

  let { data, error } = await client
    .from("products")
    .select("*")
    .eq("id", id)
    .single();

  if(error || !data){
    document.getElementById("product").innerHTML = "Product not found";
    return;
  }

  productData = data;

  document.getElementById("product").innerHTML = `
    <img class="product-img" src="${data.image}">

    <div class="details">
      <h2>${data.name}</h2>

      <div class="price">₹${data.price}</div>

      <p class="desc">
        ${data.description || "No description available"}
      </p>

      <p style="margin-top:10px;color:#666;">
        <b>Category:</b> ${data.category || "N/A"}
      </p>
    </div>
  `;
}

loadProduct();


// ================= WHATSAPP ORDER =================
function sendWhatsApp(){

  let dealerNumber = productData.whatsapp;

  if(!dealerNumber){
    alert("Dealer number not available");
    return;
  }

  let message =
`🛒 New Order Request

Product: ${productData.name}
Price: ₹${productData.price}

Mujhe ye product chahiye.`;

  let url = `https://wa.me/${dealerNumber}?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");
}

</script>

</body>
</html>
