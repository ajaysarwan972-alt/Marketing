<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Job</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

.header{
  background:#1e88e5;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.box{
  padding:10px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#1e88e5;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

textarea{
  height:100px;
  resize:none;
}
</style>
</head>

<body>

<div class="header">➕ Add Job</div>

<div class="box">

<input type="text" id="company" placeholder="Company Name">

<input type="file" id="imageFile" accept="image/*">

<input type="text" id="title" placeholder="Job Title">

<input type="text" id="state" placeholder="State">
<input type="text" id="city" placeholder="City">
<input type="text" id="jobtype" placeholder="Job Type">
<input type="text" id="education" placeholder="Education">

<textarea id="desc" placeholder="Job Description"></textarea>

<input type="text" id="phone" placeholder="Mobile Number">

<button onclick="addJob()">Submit Job</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "sb_publishable--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a";

/* FIXED CLIENT NAME */
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* IMAGE UPLOAD */
async function uploadImage(file){

  const fileName = Date.now() + "_" + file.name;

  let { error } = await supabaseClient
    .storage
    .from("job-images")
    .upload(fileName, file);

  if(error){
    alert("Image upload failed");
    console.log(error);
    return "";
  }

  let { data } = supabaseClient
    .storage
    .from("job-images")
    .getPublicUrl(fileName);

  return data.publicUrl;
}

/* ADD JOB */
async function addJob(){

  let file = document.getElementById("imageFile").files[0];
  let imageUrl = "";

  if(file){
    imageUrl = await uploadImage(file);
  }

  let company = document.getElementById("company").value;
  let title = document.getElementById("title").value;
  let state = document.getElementById("state").value;
  let city = document.getElementById("city").value;
  let jobtype = document.getElementById("jobtype").value;
  let education = document.getElementById("education").value;
  let desc = document.getElementById("desc").value;
  let phone = document.getElementById("phone").value;

  if(!company || !title){
    alert("Fill required fields");
    return;
  }

  let { error } = await supabaseClient
    .from("jobs")
    .insert([{
      company_name: company,
      image_url: imageUrl,
      title: title,
      state: state,
      city: city,
      category: jobtype,
      qualification: education,
      description: desc,
      phone: phone
    }]);

  if(error){
    alert(error.message);
    console.log(error);
  } else {
    alert("Job Added Successfully");
    window.location.href = "index.html";
  }
}
</script>

</body>
</html>
