<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Job</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

.header{
  background:linear-gradient(135deg,#1e88e5,#1565c0);
  color:white;
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.box{
  margin:12px;
  background:white;
  padding:15px;
  border-radius:12px;
}

input, select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#4caf50;
  color:white;
  border:none;
  border-radius:10px;
  font-size:15px;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">➕ Add Job</div>

<div class="box">

  <input type="text" id="company" placeholder="Company Name">

  <input type="text" id="category" placeholder="Category">

  <input type="text" id="qualification" placeholder="Qualification">

  <input type="text" id="state" placeholder="State">

  <input type="text" id="city" placeholder="City">

  <input type="text" id="area" placeholder="Area">

  <input type="number" id="salary" placeholder="Salary">

  <input type="text" id="mobile" placeholder="Mobile Number">

  <input type="text" id="image" placeholder="Image URL">

  <button onclick="addJob()">🚀 Post Job</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const client = supabase.createClient(supabaseUrl, supabaseKey);

/* USER FROM LOCALSTORAGE */
let user = JSON.parse(localStorage.getItem("user"));

if(!user){
  alert("Login first");
  window.location.href = "login.html";
}

/* ADD JOB */
async function addJob(){

  let company = document.getElementById("company").value;
  let category = document.getElementById("category").value;
  let qualification = document.getElementById("qualification").value;
  let state = document.getElementById("state").value;
  let city = document.getElementById("city").value;
  let area = document.getElementById("area").value;
  let salary = document.getElementById("salary").value;
  let mobile = document.getElementById("mobile").value;
  let image = document.getElementById("image").value;

  if(!company || !category || !qualification || !state || !city || !area || !salary || !mobile){
    alert("Fill all required fields");
    return;
  }

  const { error } = await client
    .from("jobs")
    .insert([{
      user_id: user.id,
      company_name: company,
      category: category,
      qualification: qualification,
      state: state,
      city: city,
      area: area,
      salary: parseInt(salary),
      mobile: mobile,
      image_url: image
    }]);

  if(error){
    alert(error.message);
    return;
  }

  alert("Job Posted Successfully 🚀");
  window.location.href = "job.html";
}

</script>

</body>
</html>
