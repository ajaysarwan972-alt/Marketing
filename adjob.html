<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Job</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

.header{
  background:linear-gradient(135deg,#1e88e5,#1565c0);
  color:white;
  padding:15px;
}

/* USER INFO */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.wallet{
  font-size:14px;
}

/* FORM */
.box{
  width:90%;
  max-width:500px;
  margin:auto;
  padding:15px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

textarea{
  height:100px;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#1e88e5;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <div class="top">
    <div>
      <div id="userName">User</div>
      <div id="userMobile"></div>
    </div>

    <div class="wallet">
      💰 ₹<span id="wallet">0</span>
    </div>
  </div>
</div>

<div class="box">

<input type="text" id="company" placeholder="Company Name">
<input type="file" id="imageFile" accept="image/*">
<input type="text" id="title" placeholder="Job Title">
<input type="text" id="salary" placeholder="Salary (10000-20000)">
<input type="text" id="state" placeholder="State">
<input type="text" id="city" placeholder="City">
<input type="text" id="jobtype" placeholder="Job Type">
<input type="text" id="education" placeholder="Education">
<textarea id="desc" placeholder="Job Description"></textarea>
<input type="text" id="phone" placeholder="Mobile Number">

<button onclick="addJob()">Submit Job</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* 🔥 GET USER */
let user = JSON.parse(localStorage.getItem("user"));

if(!user){
  alert("Login first");
  window.location.href = "login.html";
}

/* SHOW USER */
document.getElementById("userName").innerText = user.name;
document.getElementById("userMobile").innerText = user.mobile;
document.getElementById("wallet").innerText = user.wallet;

/* IMAGE UPLOAD */
async function uploadImage(file){

  if(!file) return "";

  const fileName = Date.now() + "_" + file.name;

  let { error } = await supabaseClient
    .storage
    .from("job-images")
    .upload(fileName, file);

  if(error){
    alert("Image upload failed");
    return "";
  }

  let { data } = supabaseClient
    .storage
    .from("job-images")
    .getPublicUrl(fileName);

  return data.publicUrl;
}

/* ADD JOB */
async function addJob(){

  let file = document.getElementById("imageFile").files[0];

  let company = document.getElementById("company").value;
  let title = document.getElementById("title").value;
  let salary = document.getElementById("salary").value;
  let state = document.getElementById("state").value;
  let city = document.getElementById("city").value;
  let jobtype = document.getElementById("jobtype").value;
  let education = document.getElementById("education").value;
  let desc = document.getElementById("desc").value;
  let phone = document.getElementById("phone").value;

  if(!company || !title){
    alert("Company & Title required");
    return;
  }

  let imageUrl = await uploadImage(file);

  let { error } = await supabaseClient
    .from("jobs")
    .insert([{
      company_name: company,
      image_url: imageUrl,
      title: title,
      state: state,
      city: city,
      category: jobtype,
      qualification: education,
      description: desc,
      phone: phone,
      salary: salary,

      // 🔥 USER LINK (VERY IMPORTANT)
      user_mobile: user.mobile
    }]);

  if(error){
    alert(error.message);
  } else {
    alert("Job Added Successfully 🚀");
    window.location.href = "index.html";
  }
}
</script>

</body>
</html>
