<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}
  
.header{
  background:linear-gradient(135deg,#1e88e5,#1565c0);
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.userbox{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

.wallet{
  font-size:18px;
  color:#ff9800;
  font-weight:bold;
}

button{
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.addmoney{
  background:#4caf50;
  color:white;
}

.addjob{
  background:#ff9800;
  color:white;
  width:90%;
  margin:10px auto;
  display:block;
}

.card{
  background:white;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.tag{
  display:inline-block;
  padding:4px 10px;
  background:#e3f2fd;
  color:#1976d2;
  border-radius:20px;
  font-size:12px;
  margin:3px;
}
</style>
</head>

<body>

<div class="header">👤 My Dashboard</div>

<div class="userbox">
  <h3 id="uname">Loading...</h3>
  <div>ID: <span id="uid"></span></div>
  <div class="wallet">Wallet: ₹<span id="wallet">0</span></div>

  <button class="addmoney" onclick="addMoney()">➕ Add Money</button>
</div>

<button class="addjob" onclick="goAddJob()">➕ Add Job</button>

<div id="jobs"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>

const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "YOUR_ANON_KEY"; // ⚠️ safe replace

const client = supabase.createClient(supabaseUrl, supabaseKey);

let userData = null;

/* 🔥 SAFE USER LOAD */
async function loadUser(){

  const { data, error } = await client.auth.getUser();

  const authUser = data?.user;

  if(error || !authUser){
    alert("Login first");
    window.location.href = "login.html";
    return;
  }

  const { data: user, error: err } = await client
    .from("users")
    .select("*")
    .eq("id", authUser.id)
    .single();

  if(err || !user){
    alert("User not found in users table");
    return;
  }

  userData = user;

  document.getElementById("uname").innerText = user.name || authUser.email;
  document.getElementById("uid").innerText = user.id;
  document.getElementById("wallet").innerText = user.wallet || 0;

  loadJobs();
}

loadUser();

/* 🔥 SAFE JOB LOAD */
async function loadJobs(){

  if(!userData){
    document.getElementById("jobs").innerHTML = "User not loaded";
    return;
  }

  const { data, error } = await client
    .from("jobs")
    .select("*")
    .eq("user_id", userData.id);

  let box = document.getElementById("jobs");
  box.innerHTML = "";

  if(error){
    box.innerHTML = "Error: " + error.message;
    return;
  }

  if(!data || data.length === 0){
    box.innerHTML = "<p style='text-align:center'>No Jobs Added</p>";
    return;
  }

  data.forEach(j=>{
    box.innerHTML += `
      <div class="card">
        <img src="${j.image_url || 'https://via.placeholder.com/300'}">
        <h3>${j.company_name || ''}</h3>

        <span class="tag">${j.category || ''}</span>
        <span class="tag">${j.qualification || ''}</span>

        <p>${j.city || ''}, ${j.state || ''}</p>

        <p><b>Salary:</b> ₹${j.salary || 'N/A'}</p>
      </div>
    `;
  });
}

/* NAV */
function addMoney(){
  window.location.href = "admoney.html";
}

function goAddJob(){
  window.location.href = "addjob.html";
}

</script>

</body>
</html>
