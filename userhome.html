<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#1e88e5,#1565c0);
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

/* USER BOX */
.userbox{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

.userbox h3{
  margin:5px 0;
}

.wallet{
  font-size:18px;
  color:#ff9800;
  font-weight:bold;
}

button{
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.addmoney{
  background:#4caf50;
  color:white;
}

.addjob{
  background:#ff9800;
  color:white;
  width:90%;
  margin:10px auto;
  display:block;
}

/* JOB CARD */
.card{
  background:white;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.card h3{
  margin:8px 0;
}

.tag{
  display:inline-block;
  padding:4px 10px;
  background:#e3f2fd;
  color:#1976d2;
  border-radius:20px;
  font-size:12px;
  margin:3px;
}
</style>
</head>

<body>

<div class="header">👤 My Dashboard</div>

<div class="userbox">
  <h3 id="uname"></h3>
  <div>ID: <span id="uid"></span></div>
  <div class="wallet">Wallet: ₹<span id="wallet"></span></div>

  <button class="addmoney" onclick="addMoney()">➕ Add Money</button>
</div>

<!-- 🔥 BUTTONS -->
<button class="addjob" onclick="goAddJob()">➕ Add Job (Form)</button>
<button class="addjob" onclick="goAdJob()">🧑‍💼 Job Page</button>

<div id="jobs"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let user = JSON.parse(localStorage.getItem("user"));

/* 🔥 CHECK LOGIN */
if(!user){
  alert("Login first");
  window.location.href = "login.html";
}

/* SHOW USER */
document.getElementById("uname").innerText = user.name;
document.getElementById("uid").innerText = user.id;
document.getElementById("wallet").innerText = user.wallet || 0;

/* LOAD USER JOBS */
loadJobs();

async function loadJobs(){

  const { data, error } = await client
    .from("jobs")
    .select("*")
    .eq("user_id", user.id)

  if(error){
    document.getElementById("jobs").innerHTML = error.message;
    return;
  }

  let box = document.getElementById("jobs");
  box.innerHTML = "";

  if(!data.length){
    box.innerHTML = "<p style='text-align:center'>No Jobs Added</p>";
    return;
  }

  data.forEach(j=>{
    box.innerHTML += `
      <div class="card">
        <img src="${j.image_url || 'https://via.placeholder.com/300'}">

        <h3>${j.company_name || ''}</h3>

        <span class="tag">${j.category || ''}</span>
        <span class="tag">${j.qualification || ''}</span>

        <p>${j.city || ''}, ${j.state || ''}</p>

        <p><b>Salary:</b> ₹${j.salary || 'N/A'}</p>
      </div>
    `;
  });
}

/* NAVIGATION */
function addMoney(){
  window.location.href = "admoney.html";
}

function goAddJob(){
  window.location.href = "addjob.html";
}

/* 🔥 NEW BUTTON FUNCTION */
function goAdJob(){
  window.location.href = "adjob.html";
}

</script>

</body>
</html>
