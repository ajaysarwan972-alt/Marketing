<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhola Shop</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

/* TOP BAR */
.header{
  background:#ff3f6c;
  color:white;
  padding:12px;
  display:flex;
  align-items:center;
}

.menu{
  font-size:26px;
  cursor:pointer;
}

/* SIDE MENU */
.side{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#111;
  color:#fff;
  transition:0.3s;
  padding-top:60px;
}

.side a{
  display:block;
  padding:12px;
  color:#fff;
  text-decoration:none;
  border-bottom:1px solid #333;
}

.side a:hover{
  background:#ff3f6c;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
}

/* HERO */
.hero{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

/* CATEGORY */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.box{
  background:white;
  padding:25px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.box:active{
  transform:scale(0.97);
}
</style>
</head>

<body>

<div class="header">
  <div class="menu" onclick="openMenu()">☰</div>
  <h3 style="margin-left:15px;">Bhola Shop</h3>
</div>

<!-- SIDE MENU -->
<div class="side" id="side">
  <a href="index.html">Home</a>
  <a href="game.html">Jodi</a>
  <a href="harf.html">Harf</a>
  <a href="crossing.html">Crossing</a>
  <a href="copypast.html">Copy Paste</a>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="hero">
  <h2>🛒 Bhola Shop</h2>
  <p>Cash on Delivery Available</p>
</div>

<div class="grid">
  <div class="box" onclick="go('mobile.html')">📱 Mobile</div>
  <div class="box" onclick="go('clothes.html')">👕 Clothes</div>
  <div class="box" onclick="go('electronics.html')">💻 Electronics</div>
  <div class="box" onclick="go('grocery.html')">🛒 Grocery</div>
</div>

<script>

function openMenu(){
  document.getElementById("side").style.left="0";
  document.getElementById("overlay").style.display="block";
}

function closeMenu(){
  document.getElementById("side").style.left="-260px";
  document.getElementById("overlay").style.display="none";
}

function go(page){
  window.location.href = page;
}

</script>

</body>
</html>
