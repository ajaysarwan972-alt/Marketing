<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Market Home</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

.topbar{
background:#111;
color:#fff;
text-align:center;
padding:10px;
font-weight:bold;
font-size:14px;
}

.header{
background:#fff;
padding:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
position:sticky;
top:0;
z-index:99;
}

.search{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:30px;
box-sizing:border-box;
font-size:16px;
}

.dealer-btn{
display:block;
margin:12px auto 0;
width:230px;
text-align:center;
background:#0a9d2f;
color:#fff;
padding:12px;
text-decoration:none;
border-radius:30px;
font-weight:bold;
}

.banner{
margin:15px;
background:linear-gradient(45deg,#ff0080,#ff9800);
padding:35px;
border-radius:25px;
text-align:center;
color:white;
font-size:30px;
font-weight:bold;
}

.notice{
margin:15px;
background:#fff4cf;
border:2px solid orange;
border-radius:18px;
padding:18px;
text-align:center;
font-weight:bold;
line-height:28px;
}

.title{
padding:15px;
font-size:24px;
font-weight:bold;
}

.cat-wrap{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
padding:15px;
}

.cat{
background:#fff;
border-radius:20px;
padding:15px 8px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.08);
font-weight:bold;
}

.cat span{
display:block;
font-size:30px;
margin-bottom:8px;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card{
background:#fff;
border-radius:18px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.pimg{
height:180px;
background:#eee;
}

.pimg img{
width:100%;
height:100%;
object-fit:cover;
}

.info{
padding:12px;
}

.name{
font-size:18px;
font-weight:bold;
}

.price{
font-size:22px;
font-weight:bold;
color:#e91e63;
margin-top:8px;
}

.cod{
display:inline-block;
margin-top:8px;
background:#e8fff0;
color:green;
padding:6px 12px;
border-radius:20px;
font-size:12px;
}

.buy{
display:block;
margin-top:12px;
background:#ff0080;
color:white;
text-decoration:none;
text-align:center;
padding:11px;
border-radius:25px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="topbar">
Product dalne ke liye 10 Rs month ke only 1 product
</div>

<div class="header">
<input class="search" placeholder="Search products...">

<a href="login.html" class="dealer-btn">
Dealer Login
</a>
</div>

<div class="banner">
MEGA SALE
</div>

<div class="notice">
ONLY CASH ON DELIVERY ACCEPT <br>
किसी को भी payment पहले ना दें <br>
Product receive ke baad payment dein
</div>

<div class="title">
Shop By Category
</div>

<div class="cat-wrap">
<div class="cat"><span>👗</span>Fashion</div>
<div class="cat"><span>📱</span>Mobile</div>
<div class="cat"><span>💄</span>Beauty</div>
<div class="cat"><span>🏠</span>Home</div>
<div class="cat"><span>🛋</span>Furniture</div>
<div class="cat"><span>🚲</span>Bike</div>
<div class="cat"><span>🎮</span>Games</div>
<div class="cat"><span>📦</span>More</div>
</div>

<div class="title">
Latest Products
</div>

<div class="products" id="products">
Loading...
</div>

<script>
const supabaseUrl="https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey="sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a";

const supabase=window.supabase.createClient(
supabaseUrl,
supabaseKey
);

async function loadProducts(){

const {data,error}=await supabase
.from("products")
.select("*")
.order("id",{ascending:false});

if(error){
document.getElementById("products").innerHTML=
"Products not loading";
return;
}

if(!data.length){
document.getElementById("products").innerHTML=
"No Products Added Yet";
return;
}

let html="";

data.forEach(p=>{

html+=`
<div class="card">

<div class="pimg">
<img src="${p.image || 'https://via.placeholder.com/300'}">
</div>

<div class="info">

<div class="name">
${p.product_name}
</div>

<div class="price">
₹${p.price}
</div>

<div class="cod">
Cash On Delivery
</div>

<a class="buy"
href="https://wa.me/${p.whatsapp}?text=I want to order ${p.product_name}">
Order Now
</a>

</div>

</div>
`;

});

document.getElementById("products").innerHTML=html;

}

loadProducts();
</script>

</body>
</html>
