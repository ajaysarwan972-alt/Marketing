<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Portal</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f2f4f8;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#1e88e5,#42a5f5);
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  position:relative;
}

/* BUTTON */
.header a button{
  position:absolute;
  right:10px;
  top:10px;
  background:white;
  color:#1e88e5;
  border:none;
  padding:8px 10px;
  border-radius:8px;
  font-size:11px;
  font-weight:bold;
}

/* SEARCH */
.searchBox{
  margin:10px;
}

.searchBox input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

/* JOB CARD */
.job{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.title{
  font-size:18px;
  font-weight:bold;
}

.info{
  font-size:14px;
  color:#555;
  margin-top:5px;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:green;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
  📌 Job Portal

  <a href="dealerjob.html">
    <button>Apni Job add krne ke liye yaha click kre</button>
  </a>

</div>

<!-- SEARCH -->
<div class="searchBox">
  <input type="text" id="search" placeholder="Search job..." onkeyup="filterJobs()">
</div>

<!-- JOB LIST -->
<div id="jobs"></div>

<script>

// SAMPLE JOBS (baad me database se aayega)
let jobs = [
  {
    title:"Factory Helper",
    city:"Haryana",
    salary:"₹10,000",
    phone:"9876543210"
  },
  {
    title:"Account Assistant",
    city:"Delhi",
    salary:"₹12,000",
    phone:"9123456780"
  },
  {
    title:"Delivery Driver",
    city:"UP",
    salary:"₹15,000",
    phone:"9000000000"
  }
];

function showJobs(data){

  let box = document.getElementById("jobs");
  box.innerHTML = "";

  data.forEach(j => {

    let div = document.createElement("div");
    div.className = "job";

    div.innerHTML = `
      <div class="title">${j.title}</div>
      <div class="info">📍 ${j.city}</div>
      <div class="info">💰 ${j.salary}</div>

      <a href="tel:${j.phone}">
        <button>📞 Call HR</button>
      </a>
    `;

    box.appendChild(div);
  });

}

// SEARCH FILTER
function filterJobs(){

  let val = document.getElementById("search").value.toLowerCase();

  let filtered = jobs.filter(j =>
    j.title.toLowerCase().includes(val) ||
    j.city.toLowerCase().includes(val)
  );

  showJobs(filtered);
}

// INIT
showJobs(jobs);

</script>

</body>
</html>
