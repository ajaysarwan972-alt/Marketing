<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APNA BAZAR</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f6fa;
}

/* HEADER */
.header{
  background:white;
  padding:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

.logo{
  font-weight:bold;
  color:#ff3c7e;
}

.search{
  flex:1;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
}

/* CATEGORY */
.categories{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  background:white;
}

.cat{
  min-width:70px;
  text-align:center;
  font-size:12px;
  cursor:pointer;
}

.cat img{
  width:50px;
  height:50px;
  border-radius:50%;
  object-fit:cover;
}

/* 🔥 BUTTON BAR */
.actions{
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:white;
}

.actions button{
  padding:8px 12px;
  border:none;
  border-radius:20px;
  font-size:12px;
  color:white;
  cursor:pointer;
}

.add{ background:#25D366; }
.job{ background:#3498db; }
.game{ background:#ff3c7e; }

/* PRODUCTS */
#products{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:8px;
  padding:10px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:100px;
  object-fit:contain;
  background:#fff;
}

.card h3{
  font-size:11px;
  margin:5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.card p{
  margin:5px;
  color:#ff3c7e;
  font-weight:bold;
  font-size:12px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">APNA BAZAR</div>
  <div class="search">
    <input type="text" id="search" placeholder="Search category..." onkeyup="filterProducts()">
  </div>
</div>

<div class="categories" id="catScroll"></div>

<!-- 🔥 NEW BUTTONS -->
<div class="actions">
  <button class="add" onclick="location.href='login.html'">➕ Add Product</button>
  <button class="job">💼 Job</button>
  <button class="game" onclick="location.href='game.html'">🎮 Game</button>
</div>

<div id="products">Loading...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let allProducts = [];
let selectedCategory = "";

load();

/* LOAD */
async function load(){
  const { data, error } = await client.from("products").select("*");

  if(error){
    document.getElementById("products").innerHTML = error.message;
    return;
  }

  allProducts = data || [];
  buildCategories();
  show(allProducts);
}

/* CATEGORY */
function buildCategories(){
  let scroll = document.getElementById("catScroll");
  scroll.innerHTML = "";

  let map = {};

  allProducts.forEach(p=>{
    if(p.category && !map[p.category]){
      map[p.category] = p.category_image || p.image;
    }
  });

  scroll.innerHTML += `
    <div class="cat" onclick="selectCategory('')">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png">
      <div>All</div>
    </div>
  `;

  Object.keys(map).forEach(c=>{
    scroll.innerHTML += `
      <div class="cat" onclick="selectCategory('${c}')">
        <img src="${map[c]}">
        <div>${c}</div>
      </div>
    `;
  });
}

function selectCategory(cat){
  selectedCategory = cat;
  filterProducts();
}

/* SHOW */
function show(data){
  let box = document.getElementById("products");
  box.innerHTML = "";

  if(!data.length){
    box.innerHTML = "No Products";
    return;
  }

  data.forEach(p=>{
    box.innerHTML += `
      <div class="card" onclick="openProduct('${p.id}')">
        <img src="${p.image || 'https://via.placeholder.com/300'}">
        <h3>${p.name || ''}</h3>
        <p>₹${p.price || 0}</p>
      </div>
    `;
  });
}

/* FILTER (CATEGORY SEARCH) */
function filterProducts(){
  let search = document.getElementById("search").value.toLowerCase().trim();

  let filtered = allProducts.filter(p=>{
    let cat = (p.category || "").toLowerCase();
    return (!search || cat.includes(search))
      && (!selectedCategory || p.category===selectedCategory);
  });

  show(filtered);
}

function openProduct(id){
  window.location.href = "view.html?id=" + id;
}
</script>

</body>
</html>
