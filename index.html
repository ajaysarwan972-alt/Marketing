<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Portal</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f4f8;
}

/* HEADER BUTTON */
.top{
  background:#1e88e5;
  padding:15px;
  text-align:center;
}

.top a button{
  background:white;
  color:#1e88e5;
  border:none;
  padding:12px 15px;
  border-radius:10px;
  font-weight:bold;
  font-size:14px;
}

/* FILTER BOX */
.filter{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<!-- TOP BUTTON -->
<div class="top">
  <a href="dealerjob.html">
    <button>🧑 Apni Job dalne ke liye yaha click kre</button>
  </a>
</div>

<!-- FILTER -->
<div class="filter">

  <h3>🔎 Job Filter</h3>

  <select>
    <option>State Select karo</option>
    <option>Haryana</option>
    <option>Delhi</option>
    <option>Uttar Pradesh</option>
    <option>Punjab</option>
    <option>Rajasthan</option>
    <option>Maharashtra</option>
    <option>Bihar</option>
    <option>All India</option>
  </select>

  <select>
    <option>City Select karo</option>
    <option>Gurgaon</option>
    <option>Delhi</option>
    <option>Noida</option>
    <option>Lucknow</option>
    <option>Jaipur</option>
    <option>Mumbai</option>
    <option>Patna</option>
    <option>All Cities</option>
  </select>

</div>

</body>
</html>
