<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Portal</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

.header{
  background:#1e88e5;
  color:white;
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* ADMIN BUTTON */
.admin-bar{
  padding:10px;
}

.admin-bar button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff9800;
  color:white;
  font-weight:bold;
}

/* DROPDOWNS */
.box{
  padding:10px;
}

.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

select{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  background:white;
}

/* CARD */
.card{
  background:white;
  margin:12px;
  padding:12px;
  border-radius:15px;
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:12px;
}

.tag{
  display:inline-block;
  padding:4px 10px;
  background:#e3f2fd;
  color:#1976d2;
  border-radius:20px;
  font-size:12px;
  margin:3px;
}

button.view{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#1e88e5;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">🚀 Job Finder</div>

<!-- ADMIN BUTTON -->
<div class="admin-bar">
  <button onclick="window.location.href='admin.html'">🔐 Admin Panel</button>
</div>

<!-- DROPDOWNS -->
<div class="box">

  <div class="row">
    <select id="state" onchange="filterJobs()">
      <option value="">State</option>
    </select>

    <select id="city" onchange="filterJobs()">
      <option value="">City</option>
    </select>
  </div>

  <div class="row">
    <select id="jobtype" onchange="filterJobs()">
      <option value="">Job Type</option>
    </select>

    <select id="education" onchange="filterJobs()">
      <option value="">Education</option>
    </select>
  </div>

</div>

<div id="jobs"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";

/* ✔ YOUR WORKING KEY */
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let allJobs = [];

window.onload = async function(){
  await loadJobs();
  await loadFilters();
}

/* LOAD JOBS */
async function loadJobs(){

  let { data, error } = await supabase
    .from("jobs")
    .select("*")
    .order("id",{ascending:false});

  if(error){
    console.log(error);
    return;
  }

  allJobs = data || [];
  renderJobs(allJobs);
}

/* LOAD FILTERS */
async function loadFilters(){

  let { data } = await supabase.from("jobs").select("state,city,category,qualification");

  if(!data) return;

  fill("state",[...new Set(data.map(i=>i.state).filter(Boolean))]);
  fill("city",[...new Set(data.map(i=>i.city).filter(Boolean))]);
  fill("jobtype",[...new Set(data.map(i=>i.category).filter(Boolean))]);
  fill("education",[...new Set(data.map(i=>i.qualification).filter(Boolean))]);
}

function fill(id, arr){
  let box = document.getElementById(id);
  arr.forEach(v=>{
    box.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

/* FILTER FUNCTION */
function filterJobs(){

  let state = document.getElementById("state").value;
  let city = document.getElementById("city").value;
  let jobtype = document.getElementById("jobtype").value;
  let education = document.getElementById("education").value;

  let filtered = allJobs.filter(j =>
    (!state || j.state == state) &&
    (!city || j.city == city) &&
    (!jobtype || j.category == jobtype) &&
    (!education || j.qualification == education)
  );

  renderJobs(filtered);
}

/* SHOW JOBS */
function renderJobs(data){

  let box = document.getElementById("jobs");
  box.innerHTML = "";

  if(data.length === 0){
    box.innerHTML = "<p style='text-align:center'>No Jobs Found</p>";
    return;
  }

  data.forEach(j=>{
    box.innerHTML += `
      <div class="card">
        <img src="${j.image_url || 'https://via.placeholder.com/300'}">
        <h3>${j.company_name || ''}</h3>

        <span class="tag">${j.category || ''}</span>
        <span class="tag">${j.qualification || ''}</span>

        <p>${j.city || ''} | ${j.state || ''}</p>

        <button class="view">View Details</button>
      </div>
    `;
  });
}
</script>

</body>
</html>
