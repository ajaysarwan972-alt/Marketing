<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Details</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

.header{
  background:linear-gradient(135deg,#1e88e5,#1565c0);
  color:white;
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:12px;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
}

.tag{
  display:inline-block;
  padding:5px 10px;
  background:#e3f2fd;
  color:#1976d2;
  border-radius:20px;
  font-size:12px;
  margin:5px 3px;
}

select{
  width:100%;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  border:1px solid #ccc;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#1e88e5;
  color:white;
  border:none;
  border-radius:10px;
}

.loading{
  text-align:center;
  margin-top:30px;
}
</style>
</head>

<body>

<div class="header">📄 Job Details</div>

<div class="container">

  <!-- 🔥 AREA DROPDOWN -->
  <select id="area" onchange="filterByArea()">
    <option value="">Select Area</option>
  </select>

  <div id="job" class="loading">Loading...</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let jobData = null;

window.onload = loadJob;

/* LOAD JOB */
async function loadJob(){

  if(!id){
    document.getElementById("job").innerHTML = "<h3>Job ID missing</h3>";
    return;
  }

  const { data, error } = await supabase
    .from("jobs")
    .select("*")
    .eq("id", id)
    .single();

  if(error || !data){
    document.getElementById("job").innerHTML = "<h3>Job not found</h3>";
    return;
  }

  jobData = data;

  loadAreas(data.city); // 🔥 city ke hisaab se area load
  showJob(data);
}

/* 🔥 LOAD AREA BASED ON CITY */
async function loadAreas(city){

  const { data } = await supabase
    .from("jobs")
    .select("area, city")
    .eq("city", city);

  let box = document.getElementById("area");
  box.innerHTML = `<option value="">Select Area</option>`;

  let unique = [...new Set((data || []).map(i => i.area).filter(Boolean))];

  unique.forEach(v=>{
    box.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

/* 🔥 FILTER BY AREA */
function filterByArea(){

  let selectedArea = document.getElementById("area").value;

  if(!selectedArea){
    showJob(jobData);
    return;
  }

  if(jobData.area === selectedArea){
    showJob(jobData);
  }else{
    document.getElementById("job").innerHTML = "<h3>No job in this area</h3>";
  }
}

/* SHOW JOB */
function showJob(j){

  document.getElementById("job").innerHTML = `
    <div class="card">

      <img src="${j.image_url || 'https://via.placeholder.com/300'}">

      <h2>${j.company_name || ''}</h2>

      <span class="tag">${j.category || ''}</span>
      <span class="tag">${j.qualification || ''}</span>

      <p><b>City:</b> ${j.city || ''}</p>
      <p><b>State:</b> ${j.state || ''}</p>
      <p><b>Area:</b> ${j.area || ''}</p>

      <button class="btn" onclick="alert('Apply system add later')">
        Apply Now
      </button>

    </div>
  `;
}

</script>

</body>
</html>
