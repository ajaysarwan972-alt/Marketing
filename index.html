<!DOCTYPE html>
<html>
<head>
  <title>My Market</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    .notice {
      background: linear-gradient(90deg, red, orange);
      color: white;
      padding: 10px;
      text-align: center;
      font-weight: bold;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: #111;
      color: white;
    }

    .btn {
      background: orange;
      padding: 8px 15px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card h4 {
      margin: 10px;
    }

    .price {
      color: green;
      margin: 0 10px;
      font-weight: bold;
    }

    .whatsapp {
      display: block;
      margin: 10px;
      background: #25D366;
      color: white;
      text-align: center;
      padding: 8px;
      border-radius: 5px;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="notice">
  📢 ₹10 me apna product promote karo (30 din)
</div>

<div class="header">
  <h3>My Market</h3>
  <button class="btn" onclick="goLogin()">Dealer Login</button>
</div>

<div class="products" id="products"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// load products
const load = async ()=>{
  const { data } = await supabase.from("products").select("*");

  const div = document.getElementById("products");

  div.innerHTML = data.map(p=>`
    <div class="card">
      <img src="${p.image}">
      <h4>${p.name}</h4>
      <div class="price">₹${p.price}</div>
      <a class="whatsapp" href="https://wa.me/${p.whatsapp}" target="_blank">
        Contact on WhatsApp
      </a>
    </div>
  `).join("");
}

load();

// login redirect
window.goLogin = ()=>{
  location.href = "login.html";
}
</script>

</body>
</html>
