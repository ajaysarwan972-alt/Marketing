<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Portal</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

.header{
  background:linear-gradient(135deg,#1e88e5,#1565c0);
  color:white;
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* BUTTONS (ONLY ADMIN NOW) */
.top-btns{
  padding:10px;
  display:flex;
  gap:10px;
}

.top-btns button{
  flex:1;
  padding:12px;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
}

.admin{ background:#ff9800; }

/* DROPDOWNS */
.box{ padding:10px; }

.row{
  display:flex;
  gap:10px;
  margin-top:8px;
}

select{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  background:white;
}

/* CARD */
.card{
  background:white;
  margin:12px;
  padding:12px;
  border-radius:15px;
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:12px;
}

.tag{
  display:inline-block;
  padding:4px 10px;
  background:#e3f2fd;
  color:#1976d2;
  border-radius:20px;
  font-size:12px;
  margin:3px;
}

button.view{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#1e88e5;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">🚀 Job Finder</div>

<!-- ONLY ADMIN BUTTON -->
<div class="top-btns">
  <button class="admin" onclick="window.location.href='admin.html'">
    🔐 Admin Panel
  </button>
</div>

<!-- DROPDOWNS -->
<div class="box">

  <div class="row">
    <select id="state" onchange="filterJobs()">
      <option value="">State</option>
    </select>

    <select id="city" onchange="filterJobs()">
      <option value="">City</option>
    </select>
  </div>

  <div class="row">
    <select id="jobtype" onchange="filterJobs()">
      <option value="">Job Type</option>
    </select>

    <select id="education" onchange="filterJobs()">
      <option value="">Education</option>
    </select>
  </div>

</div>

<div id="jobs"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let allJobs = [];

window.onload = async function(){
  await loadJobs();
  fillDropdowns();
}

/* LOAD JOBS */
async function loadJobs(){

  let { data, error } = await supabase
    .from("jobs")
    .select("*")
    .order("id",{ascending:false});

  if(error){
    console.log(error);
    alert("Error loading jobs");
    return;
  }

  allJobs = data || [];
  showJobs(allJobs);
}

/* FILTER */
function filterJobs(){

  let state = document.getElementById("state").value;
  let city = document.getElementById("city").value;
  let jobtype = document.getElementById("jobtype").value;
  let education = document.getElementById("education").value;

  let filtered = allJobs.filter(j =>
    (!state || j.state === state) &&
    (!city || j.city === city) &&
    (!jobtype || j.category === jobtype) &&
    (!education || j.qualification === education)
  );

  showJobs(filtered);
}

/* DROPDOWNS */
function fillDropdowns(){

  fill("state", [...new Set(allJobs.map(j=>j.state).filter(Boolean))]);
  fill("city", [...new Set(allJobs.map(j=>j.city).filter(Boolean))]);
  fill("jobtype", [...new Set(allJobs.map(j=>j.category).filter(Boolean))]);
  fill("education", [...new Set(allJobs.map(j=>j.qualification).filter(Boolean))]);
}

function fill(id, arr){
  let box = document.getElementById(id);
  arr.forEach(v=>{
    box.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

/* SHOW JOBS */
function showJobs(data){

  let box = document.getElementById("jobs");
  box.innerHTML = "";

  if(!data.length){
    box.innerHTML = "<p style='text-align:center'>No Jobs Found</p>";
    return;
  }

  data.forEach(j => {

    box.innerHTML += `
      <div class="card">
        <img src="${j.image_url || 'https://via.placeholder.com/300'}">

        <h3>${j.company_name || ''}</h3>

        <span class="tag">${j.category || ''}</span>
        <span class="tag">${j.qualification || ''}</span>

        <p>${j.city || ''} | ${j.state || ''}</p>

        <a href="job.html?id=${j.id}">
          <button class="view">View Details</button>
        </a>
      </div>
    `;
  });
}
</script>

</body>
</html>
