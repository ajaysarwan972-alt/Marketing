<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Portal</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f4f8;
}

.header{
  background:#1e88e5;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.box{
  padding:10px;
}

select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

.card{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  background:#1e88e5;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">📌 Job Portal</div>

<div class="box">

<select id="state" onchange="loadJobs()">
  <option value="">State Select</option>
  <option>Haryana</option>
  <option>Delhi</option>
  <option>UP</option>
</select>

<select id="city" onchange="loadJobs()">
  <option value="">City Select</option>
  <option>Ambala</option>
  <option>Gurgaon</option>
  <option>Delhi</option>
  <option>Lucknow</option>
</select>

</div>

<div id="jobs"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "sb_publishable--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a";

const supabase = supabase.createClient(supabaseUrl, supabaseKey);

// LOAD JOBS
async function loadJobs(){

  let { data, error } = await supabase
    .from("jobs")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    console.log(error);
    return;
  }

  let state = document.getElementById("state").value;
  let city = document.getElementById("city").value;

  let filtered = data.filter(job =>
    (state === "" || job.state === state) &&
    (city === "" || job.city === city)
  );

  showJobs(filtered);
}

// SHOW CARDS
function showJobs(data){

  let box = document.getElementById("jobs");
  box.innerHTML = "";

  data.forEach(job => {

    box.innerHTML += `
      <div class="card">
        <img src="${job.image_url || 'https://via.placeholder.com/300'}">
        <h3>${job.company_name}</h3>
        <p><b>${job.title}</b></p>
        <p>${job.city} | ${job.state}</p>

        <a href="job.html?id=${job.id}">
          <button>View Details</button>
        </a>
      </div>
    `;
  });
}

// INIT
loadJobs();

</script>

</body>
</html>
