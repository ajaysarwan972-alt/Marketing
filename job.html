<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Details</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

.header{
  background:linear-gradient(135deg,#1e88e5,#1565c0);
  color:white;
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:12px;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
}

.tag{
  display:inline-block;
  padding:5px 10px;
  background:#e3f2fd;
  color:#1976d2;
  border-radius:20px;
  font-size:12px;
  margin:5px 3px;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#1e88e5;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">📄 Job Details</div>

<div class="container">
  <div id="job">Loading...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// URL se ID
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

window.onload = loadJob;

async function loadJob(){

  if(!id){
    document.getElementById("job").innerHTML = "<h3>Job ID missing</h3>";
    return;
  }

  const { data, error } = await supabase
    .from("jobs")
    .select("*")
    .eq("id", id)
    .single();

  if(error || !data){
    document.getElementById("job").innerHTML = "<h3>Job not found</h3>";
    return;
  }

  showJob(data);
}

function showJob(j){

  document.getElementById("job").innerHTML = `
    <div class="card">

      <img src="${j.image_url || 'https://via.placeholder.com/300'}">

      <h2>${j.company_name || ''}</h2>

      <span class="tag">${j.category || ''}</span>
      <span class="tag">${j.qualification || ''}</span>
      <span class="tag">${j.area || ''}</span>

      <p><b>City:</b> ${j.city || ''}</p>
      <p><b>State:</b> ${j.state || ''}</p>

      <button class="btn" onclick="alert('Apply system later')">
        Apply Now
      </button>

    </div>
  `;
}

</script>

</body>
</html>
