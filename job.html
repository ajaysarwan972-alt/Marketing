<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Portal</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

.header{
  background:linear-gradient(135deg,#1e88e5,#1565c0);
  color:white;
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.top-btn{padding:12px;}
.top-btn button{
  width:100%;
  padding:12px;
  background:#ff9800;
  color:white;
  border:none;
  border-radius:10px;
  font-size:15px;
  font-weight:bold;
}

.box{padding:12px;}

.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

select{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  background:white;
}

.card{
  background:white;
  margin:12px;
  padding:12px;
  border-radius:15px;
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:12px;
}

.tag{
  display:inline-block;
  padding:4px 10px;
  background:#e3f2fd;
  color:#1976d2;
  border-radius:20px;
  font-size:12px;
  margin:3px;
}

button.view{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#1e88e5;
  color:white;
  border:none;
  border-radius:10px;
}

/* DETAIL PAGE */
#jobDetail{
  display:none;
  padding:12px;
}
</style>
</head>

<body>

<div class="header">🚀 Job Finder</div>

<div class="top-btn">
  <button onclick="window.location.href='admin.html'">
    ➕ Job Add (Admin Panel)
  </button>
</div>

<div class="box">

  <div class="row">
    <select id="state" onchange="filterJobs(); loadCities();">
      <option value="">Select State</option>
    </select>

    <select id="city" onchange="filterJobs(); loadAreas();">
      <option value="">Select City</option>
    </select>
  </div>

  <div class="row">
    <select id="area" onchange="filterJobs()">
      <option value="">Select Area</option>
    </select>

    <select id="category" onchange="filterJobs()">
      <option value="">Select Category</option>
    </select>
  </div>

  <div class="row">
    <select id="qualification" onchange="filterJobs()">
      <option value="">Select Qualification</option>
    </select>
  </div>

</div>

<!-- JOB LIST -->
<div id="jobs"></div>

<!-- DETAIL VIEW -->
<div id="jobDetail"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let allJobs = [];

window.onload = async function(){
  await loadJobs();
  await loadStates();
  await loadCities();
  await loadAreas();
  await loadCategories();
  await loadQualifications();
}

/* LOAD JOBS */
async function loadJobs(){
  const { data } = await supabaseClient
    .from("jobs")
    .select("*")
    .order("id",{ascending:false});

  allJobs = data || [];
  showJobs(allJobs);
}

/* STATES */
async function loadStates(){
  const { data } = await supabaseClient.from("jobs").select("state");

  let box = document.getElementById("state");
  let unique = [...new Set((data||[]).map(i=>i.state).filter(Boolean))];

  unique.forEach(v=>{
    box.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

/* CITIES */
async function loadCities(){
  let state = document.getElementById("state").value;

  let query = supabaseClient.from("jobs").select("city,state");

  if(state) query = query.eq("state", state);

  const { data } = await query;

  let box = document.getElementById("city");
  box.innerHTML = `<option value="">Select City</option>`;

  let unique = [...new Set((data||[]).map(i=>i.city).filter(Boolean))];

  unique.forEach(v=>{
    box.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

/* AREAS */
async function loadAreas(){
  let city = document.getElementById("city").value;

  let query = supabaseClient.from("jobs").select("area,city");

  if(city) query = query.eq("city", city);

  const { data } = await query;

  let box = document.getElementById("area");
  box.innerHTML = `<option value="">Select Area</option>`;

  let unique = [...new Set((data||[]).map(i=>i.area).filter(Boolean))];

  unique.forEach(v=>{
    box.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

/* CATEGORY */
async function loadCategories(){
  const { data } = await supabaseClient.from("jobs").select("category");

  let box = document.getElementById("category");
  let unique = [...new Set((data||[]).map(i=>i.category).filter(Boolean))];

  unique.forEach(v=>{
    box.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

/* QUALIFICATION */
async function loadQualifications(){
  const { data } = await supabaseClient.from("jobs").select("qualification");

  let box = document.getElementById("qualification");
  let unique = [...new Set((data||[]).map(i=>i.qualification).filter(Boolean))];

  unique.forEach(v=>{
    box.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

/* FILTER */
function filterJobs(){

  let state = document.getElementById("state").value;
  let city = document.getElementById("city").value;
  let area = document.getElementById("area").value;
  let category = document.getElementById("category").value;
  let qualification = document.getElementById("qualification").value;

  let filtered = allJobs.filter(j =>
    (!state || j.state === state) &&
    (!city || j.city === city) &&
    (!area || j.area === area) &&
    (!category || j.category === category) &&
    (!qualification || j.qualification === qualification)
  );

  showJobs(filtered);
}

/* SHOW JOB LIST */
function showJobs(data){

  document.getElementById("jobs").style.display = "block";
  document.getElementById("jobDetail").style.display = "none";

  let box = document.getElementById("jobs");
  box.innerHTML = "";

  data.forEach(j=>{
    box.innerHTML += `
      <div class="card">
        <img src="${j.image_url || 'https://via.placeholder.com/300'}">
        <h3>${j.company_name || ''}</h3>

        <span class="tag">${j.category || ''}</span>
        <span class="tag">${j.qualification || ''}</span>

        <p>${j.city || ''} | ${j.state || ''} | ${j.area || ''}</p>

        <button class="view" onclick='openDetail(${JSON.stringify(j)})'>
          View Details
        </button>
      </div>
    `;
  });
}

/* DETAIL VIEW */
function openDetail(j){

  document.getElementById("jobs").style.display = "none";
  document.getElementById("jobDetail").style.display = "block";

  document.getElementById("jobDetail").innerHTML = `
    <div class="card">

      <img src="${j.image_url || 'https://via.placeholder.com/300'}">

      <h2>${j.company_name || ''}</h2>

      <span class="tag">${j.category || ''}</span>
      <span class="tag">${j.qualification || ''}</span>
      <span class="tag">${j.area || ''}</span>

      <p><b>City:</b> ${j.city || ''}</p>
      <p><b>State:</b> ${j.state || ''}</p>

      <button class="view" onclick="goBack()">
        ⬅ Back
      </button>

    </div>
  `;
}

/* BACK */
function goBack(){
  document.getElementById("jobDetail").style.display = "none";
  document.getElementById("jobs").style.display = "block";
}

</script>

</body>
</html>
