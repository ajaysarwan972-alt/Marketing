<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Add Product</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}
body{
background:#eef3ff;
padding:20px;
}
.box{
max-width:500px;
margin:auto;
background:#fff;
padding:25px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
}
h2{
text-align:center;
color:#0072ff;
margin-bottom:20px;
}
input,textarea{
width:100%;
padding:15px;
margin:12px 0;
border:none;
background:#f4f6fa;
border-radius:14px;
font-size:16px;
}
textarea{
height:110px;
resize:none;
}
.preview{
width:100%;
display:none;
margin-top:15px;
border-radius:15px;
}
button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:bold;
margin-top:15px;
}
.saveBtn{
background:#10b981;
color:#fff;
}
.backBtn{
background:#0072ff;
color:#fff;
}
</style>
</head>
<body>

<div class="box">

<h2>Add Product</h2>

<input id="name" placeholder="Product Name">

<input id="price" placeholder="Product Price">

<input id="size" placeholder="Product Size Detail">

<input id="whatsapp" placeholder="Whatsapp Number">

<textarea id="description"
placeholder="Product Description"></textarea>

<input
type="file"
id="imageFile"
accept="image/*"
onchange="previewImage()">

<img id="preview" class="preview">

<button class="saveBtn"
onclick="saveProduct()">
Save Product
</button>

<button class="backBtn"
onclick="location.href='dealerhome.html'">
Back
</button>

</div>


<script>

const supabaseUrl=
"https://katbdbzoufiblnnsoxkk.supabase.co";

const supabaseKey=
"sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a";

const supabase=
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

let dealer=
JSON.parse(localStorage.getItem("dealer"));

if(!dealer){
location.href="dealer-login.html";
}

function previewImage(){

let file=
document.getElementById("imageFile").files[0];

if(file){
let url=URL.createObjectURL(file);

let img=document.getElementById("preview");
img.src=url;
img.style.display="block";
}

}


async function saveProduct(){

let name=
document.getElementById("name").value;

let price=
document.getElementById("price").value;

let size=
document.getElementById("size").value;

let whatsapp=
document.getElementById("whatsapp").value;

let description=
document.getElementById("description").value;

let file=
document.getElementById("imageFile").files[0];

if(!name || !price || !file){
alert("Fill required fields");
return;
}


let fileName=
Date.now()+"_"+file.name;



let upload=await supabase.storage
.from("products")
.upload(fileName,file);


if(upload.error){
alert("Image Upload Failed");
return;
}


let imageUrl=
supabase.storage
.from("products")
.getPublicUrl(fileName)
.data.publicUrl;



let {error}=await supabase
.from("products")
.insert([
{
name:name,
price:price,
size:size,
whatsapp:whatsapp,
description:description,
image:imageUrl,
dealer_id:dealer.id
}
]);


if(error){
alert("Product Save Failed");
return;
}

alert("Product Added Successfully");

location.href="dealerhome.html";

}

</script>

</body>
</html>
