<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    .header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .box {
      max-width: 400px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(90deg, orange, red);
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }

    img {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>
<body>

<div class="header">Dealer Dashboard</div>

<div class="box">
  <h3>Add Product</h3>

  <input id="name" placeholder="Product Name">
  <input id="price" placeholder="Price">
  <input type="file" id="file">
  <input id="whatsapp" placeholder="WhatsApp">

  <img id="preview">

  <button onclick="add()">Add Product</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://katbdbzoufiblnnsoxkk.supabase.co",
  "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a"
);

// 🔥 image preview
const fileInput = document.getElementById("file");
const preview = document.getElementById("preview");

fileInput.addEventListener("change", ()=>{
  const file = fileInput.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

// 🚀 add product
window.add = async ()=>{
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const whatsapp = document.getElementById("whatsapp").value;
  const file = fileInput.files[0];

  if(!file){
    alert("Image select karo");
    return;
  }

  // 🔼 upload to storage
  const fileName = Date.now() + "_" + file.name;

  const { error: uploadError } = await supabase.storage
    .from("images")
    .upload(fileName, file);

  if(uploadError){
    alert(uploadError.message);
    return;
  }

  // 🔗 get public URL
  const { data } = supabase.storage
    .from("images")
    .getPublicUrl(fileName);

  const imageUrl = data.publicUrl;

  // 💾 save product
  const { error } = await supabase.from("products").insert([
    { name, price, whatsapp, image: imageUrl }
  ]);

  if(error){
    alert(error.message);
  } else {
    alert("Product Added ✅");
    location.reload();
  }
};
</script>

</body>
</html>
