<!DOCTYPE html>
<html>
<head>
<title>Login / Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#f5f6fa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:20px;
  border-radius:12px;
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:10px;
  background:#ff3c7e;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.switch{
  text-align:center;
  margin-top:10px;
  font-size:14px;
  cursor:pointer;
  color:#555;
}

#signupBox{ display:none; }
</style>
</head>

<body>

<div class="box">

<div id="loginBox">
  <h3>Login</h3>
  <input type="text" id="mobile" placeholder="Mobile">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>

  <div class="switch" onclick="showSignup()">New user? Signup</div>
</div>

<div id="signupBox">
  <h3>Signup</h3>
  <input type="text" id="name" placeholder="Name">
  <input type="text" id="smobile" placeholder="Mobile">
  <input type="password" id="spassword" placeholder="Password">
  <button onclick="signup()">Signup</button>

  <div class="switch" onclick="showLogin()">Back to Login</div>
</div>

</div>

<script>
/* UI */
function showSignup(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("signupBox").style.display="block";
}

function showLogin(){
  document.getElementById("signupBox").style.display="none";
  document.getElementById("loginBox").style.display="block";
}

/* HASH simple */
function hash(p){
  return btoa(p);
}

/* SIGNUP */
function signup(){

  let name = document.getElementById("name").value;
  let mobile = document.getElementById("smobile").value;
  let password = document.getElementById("spassword").value;

  if(!name || !mobile || !password){
    alert("Fill all fields");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users") || "[]");

  let exists = users.find(u => u.mobile === mobile);

  if(exists){
    alert("Already registered");
    return;
  }

  let newUser = {
    id: Date.now().toString(),
    name,
    mobile,
    password: hash(password),
    wallet: 0
  };

  users.push(newUser);
  localStorage.setItem("users", JSON.stringify(users));

  alert("Signup success");
  showLogin();
}

/* LOGIN */
function login(){

  let mobile = document.getElementById("mobile").value;
  let password = document.getElementById("password").value;

  let users = JSON.parse(localStorage.getItem("users") || "[]");

  let user = users.find(u =>
    u.mobile === mobile && u.password === hash(password)
  );

  if(!user){
    alert("Wrong login");
    return;
  }

  // 🔥 MAIN FIX (single user save)
  localStorage.setItem("user", JSON.stringify(user));

  alert("Login success");
  window.location.href = "userhome.html";
}
</script>

</body>
</html>
