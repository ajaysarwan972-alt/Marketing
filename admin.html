<!DOCTYPE html>
<html>
<head>
<title>Login / Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#f5f6fa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:20px;
  border-radius:12px;
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:10px;
  background:#ff3c7e;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.switch{
  text-align:center;
  margin-top:10px;
  font-size:14px;
  cursor:pointer;
  color:#555;
}

#signupBox{ display:none; }
</style>
</head>

<body>

<div class="box">

<!-- LOGIN -->
<div id="loginBox">
  <h3>Login</h3>
  <input type="text" id="mobile" placeholder="Mobile Number">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <div class="switch" onclick="showSignup()">New user? Signup</div>
</div>

<!-- SIGNUP -->
<div id="signupBox">
  <h3>Signup</h3>
  <input type="text" id="name" placeholder="Name">
  <input type="text" id="smobile" placeholder="Mobile Number">
  <input type="password" id="spassword" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <div class="switch" onclick="showLogin()">Back to Login</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>

const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";
const supabaseKey = "YOUR_ANON_KEY"; // 🔥 real key yaha daal

const client = supabase.createClient(supabaseUrl, supabaseKey);

/* UI */
function showSignup(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("signupBox").style.display="block";
}

function showLogin(){
  document.getElementById("signupBox").style.display="none";
  document.getElementById("loginBox").style.display="block";
}

/* 🔥 MOBILE → EMAIL CONVERT */
function toEmail(mobile){
  return mobile + "@app.com";
}

/* 🔥 SIGNUP */
async function signup(){

  let name = document.getElementById("name").value;
  let mobile = document.getElementById("smobile").value;
  let password = document.getElementById("spassword").value;

  if(!name || !mobile || !password){
    alert("Fill all fields");
    return;
  }

  const email = toEmail(mobile);

  const { data, error } = await client.auth.signUp({
    email,
    password
  });

  if(error){
    alert(error.message);
    return;
  }

  const user = data.user;

  if(!user){
    alert("Signup failed");
    return;
  }

  // 🔥 SAVE IN USERS TABLE
  const { error: dbError } = await client.from("users").insert([{
    id: user.id,
    name: name,
    mobile: mobile,
    wallet: 0
  }]);

  if(dbError){
    alert(dbError.message);
    return;
  }

  alert("Signup successful");
  showLogin();
}

/* 🔥 LOGIN */
async function login(){

  let mobile = document.getElementById("mobile").value;
  let password = document.getElementById("password").value;

  const email = toEmail(mobile);

  const { data, error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert(error.message);
    return;
  }

  if(!data.user){
    alert("Login failed");
    return;
  }

  alert("Login success");

  window.location.href = "./userhome.html";
}

</script>

</body>
</html>
