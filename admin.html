<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
</head>
<body>

<h2>Banner Update</h2>

<input id="text" placeholder="Enter banner text">
<button onclick="save()">Save</button>

<script>
function save(){
  localStorage.setItem("banner", document.getElementById("text").value);
  alert("Banner updated");
}
</script>

</body>
</html>
