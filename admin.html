<!DOCTYPE html>
<html>
<head>
<title>Login / Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#f5f6fa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:20px;
  border-radius:12px;
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:10px;
  background:#ff3c7e;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.switch{
  text-align:center;
  margin-top:10px;
  font-size:14px;
  cursor:pointer;
  color:#555;
}

#signupBox{ display:none; }
</style>
</head>

<body>

<div class="box">

<div id="loginBox">
  <h3>Login</h3>
  <input type="text" id="mobile" placeholder="Mobile">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>

  <div class="switch" onclick="showSignup()">New user? Signup</div>
</div>

<div id="signupBox">
  <h3>Signup</h3>
  <input type="text" id="name" placeholder="Name">
  <input type="text" id="smobile" placeholder="Mobile">
  <input type="password" id="spassword" placeholder="Password">
  <button onclick="signup()">Signup</button>

  <div class="switch" onclick="showLogin()">Back to Login</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
const supabaseUrl = "https://katbdbzoufiblnnsoxkk.supabase.co";

/* 🔥 YOUR ANON KEY */
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGJkYnpvdWZpYmxubnNveGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDY1NDQsImV4cCI6MjA4OTY4MjU0NH0.9_4KaSEJf4TOVD67ocNBI5UypgkfpZvdB-sKqEtVBdM";

const client = supabase.createClient(supabaseUrl, supabaseKey);

/* UI */
function showSignup(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("signupBox").style.display="block";
}

function showLogin(){
  document.getElementById("signupBox").style.display="none";
  document.getElementById("loginBox").style.display="block";
}

/* HASH (simple demo) */
function hash(p){
  return btoa(p);
}

/* SIGNUP */
async function signup(){

  let name = document.getElementById("name").value;
  let mobile = document.getElementById("smobile").value;
  let password = document.getElementById("spassword").value;

  if(!name || !mobile || !password){
    alert("Fill all fields");
    return;
  }

  let { data } = await client
    .from("users")
    .select("*")
    .eq("mobile", mobile);

  if(data.length > 0){
    alert("Already registered");
    return;
  }

  let { error } = await client
    .from("users")
    .insert([{
      id: Date.now().toString(),
      name: name,
      mobile: mobile,
      password: hash(password),
      wallet: 0
    }]);

  if(error){
    alert(error.message);
  } else {
    alert("Signup success");
    showLogin();
  }
}

/* LOGIN */
async function login(){

  let mobile = document.getElementById("mobile").value;
  let password = document.getElementById("password").value;

  let { data, error } = await client
    .from("users")
    .select("*")
    .eq("mobile", mobile)
    .eq("password", hash(password));

  if(error){
    alert(error.message);
    return;
  }

  if(data.length === 0){
    alert("Wrong login");
    return;
  }

  /* 🔥 SAVE CURRENT USER */
  localStorage.setItem("user", JSON.stringify(data[0]));

  alert("Login success");
  window.location.href = "userhome.html";
}
</script>

</body>
</html>
